dataset:
  # Your nuPlan splits directory layout:
  #   /dataset/train_boston
  #   /dataset/train_pittsburgh
  #   /dataset/train_singapore
  #   /dataset/val
  #
  # Each folder should contain one or more *.db files.
  data_root: /coolas-shared/yusz/dataset/nuplan/data/cache/

  # Your maps directory layout (either of the following is supported):
  #   (A) /maps/nuplan-maps-v1.0/<city>/<version>/map.gpkg
  #   (B) /maps/<city>/<version>/map.gpkg
  #
  # If you use (B), set map_version: "" (empty).
  map_root: /coolas-shared/yusz/dataset/nuplan/dataset/maps/
  map_version: ""   # "" if maps are stored directly under map_root/<city>/<version>/

  # Explicit DB locations. Can be:
  #  - a directory (will discover *.db inside)
  #  - a single *.db file
  #  - a glob pattern
  #  - a list of the above
  #
  # Examples:
  #   train: ["/dataset/train_boston", "/dataset/train_pittsburgh", "/dataset/train_singapore"]
  #   val:   ["/dataset/val"]
  db_files:
    - /coolas-shared/yusz/dataset/nuplan/data/cache/train_boston
    - /coolas-shared/yusz/dataset/nuplan/data/cache/train_pittsburgh
    - /coolas-shared/yusz/dataset/nuplan/data/cache/train_singapore

  # Optional. If omitted, we will try to infer it (and create an empty folder if needed).
  # nuPlan's ScenarioBuilder requires a sensor_root path even if include_cameras=false.
  sensor_root: null

  # Scenario builder controls
  max_workers: 8
  scenario_types: null
  scenario_tokens: null
  log_names: null
  shuffle: true
  expand_scenarios: false
  num_scenarios_per_type: null
  limit_total_scenarios: null

  # Cache output
  cache_dir: /path/to/cache/prefworld
  split: train

  # Sampling inside each scenario (iterations)
  sample_stride: 10            # every N iterations (DB is ~20Hz)
  min_iteration: 0
  max_samples_per_scenario: null
  max_total_samples: null

  extraction:
    past_horizon_s: 2.0
    past_num_samples: 20
    future_horizon_s: 8.0
    future_num_samples: 80

    max_agents: 20
    agent_radius_m: 50.0
    keep_only_vehicles: true

    map_radius_m: 60.0
    max_map_polylines: 256
    polyline_points: 20
    include_route: true

        # Structural time step Δt_s (paper default: 0.5s). Note nuPlan DB is ~20Hz.
    structure_delta_s: 0.5
    structure_conflict_dist_m: 3.0
    structure_conflict_radius_m: 2.0

    stop_dist_threshold_m: 1.0
    lateral_threshold_m: 2.0
    turn_threshold_rad: 0.4
