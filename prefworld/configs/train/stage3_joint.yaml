seed: 0
device: cuda

dataset:
  cache_dir: /path/to/cache/prefworld_train
  split: train
  kind: samples
  max_samples: null

model:
  agent_feat_dim: 7
  z_dim: 8
  tau_dim: 64
  pc_hidden: 128
  template_hidden: 128
  energy_hidden: 128
  eb_temperature: 1.0
  eb_max_candidates: 64

optim:
  lr: 2.0e-4
  weight_decay: 1.0e-4

train:
  output_dir: outputs_stage3_joint
  batch_size: 16
  num_workers: 4
  max_epochs: 10
  grad_clip_norm: 5.0

  # Initialize from Stage-1 and Stage-2.
  stage1_checkpoint: /path/to/outputs_stage1_pc/best.pt
  stage2_checkpoint: /path/to/outputs_stage2_eb/best.pt

  # Joint objective weights
  w_pc: 1.0
  w_eb: 1.0

  # Preference completion episode construction
  pc_episode_mix_prefix_prob: 0.5
  pc_query_ratio: 0.3
  pc_cross_template_topk_frac: 0.5
  pc_cross_template_warmup_epochs: 1

  # PC loss weights (same as stage1)
  lambda_distill_mu: 1.0
  lambda_distill_cov: 0.05
  lambda_prior: 0.1
  lambda_con: 0.05
  lambda_overlap: 1.0e-3
  lambda_mod: 1.0e-3

  n_z_samples: 1
  free_bits: 0.0

  # EB penalties
  # --- New: regularize EB-STM to actually use preference beliefs ---
  eb_pref_sens_weight: 0.0
  eb_pref_sens_margin: 0.2
  eb_base_l2_weight: 0.0

  # EB penalties
  eb_smooth_scale: 0.1
  eb_phys_dist_threshold_m: 50.0
  eb_phys_penalty_scale: 1.0

  # Counterfactual conservatism regularizer (paper Eq.(26))
  # Set eb_cf_weight>0 to enable.
  eb_cf_weight: 0.0
  eb_cf_base_temperature: 2.0
  eb_cf_actions: [0, 1, 2]  # KEEP, LCL, LCR

  log_interval: 20
  val_interval: 0
